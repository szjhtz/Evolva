name: Daily Optimization

on:
  schedule:
    # 09:20 Asia/Shanghai every day.
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run daily optimizer
        run: python -m evolva.cli optimize --apply

      - name: Run tests
        run: python -m pytest -q

      - name: Commit and push optimizations
        run: |
          git config user.name "evolva-codex-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: daily Evolva optimization"
            git push origin HEAD:main
          else
            echo "No optimization changes to commit."
          fi
