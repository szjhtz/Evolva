name: Daily Optimization

on:
  schedule:
    # 09:20 Asia/Shanghai every day.
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run daily optimizer
        run: python -m evolva.cli optimize --apply

      - name: Run tests
        run: python -m pytest -q

      - name: Create optimization pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: daily Evolva optimization"
          title: "chore: daily Evolva optimization"
          body: |
            Automated daily optimization pass for Evolva.

            This workflow only applies conservative fixes generated by `python -m evolva.cli optimize --apply` and then runs the test suite.
          branch: codex/daily-optimization
          delete-branch: true
