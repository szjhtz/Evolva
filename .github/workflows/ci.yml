name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Evolva
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check evolva tests
      - name: Type check
        run: python -m mypy evolva
      - name: Compile
        run: python -m compileall evolva tests
      - name: Unit tests
        run: python -m coverage run -m pytest -q
      - name: Coverage
        run: python -m coverage report
      - name: Build package
        run: python -m build
      - name: Eval gate - core smoke
        run: python -m evolva.cli eval evals/tasks/smoke.jsonl --yes --baseline evals/baselines/smoke.json --min-score 1.0 --no-regression
      - name: Eval gate - repo index
        run: python -m evolva.cli eval evals/tasks/repo_index.jsonl --yes --baseline evals/baselines/repo_index.json --min-score 1.0 --no-regression
      - name: Eval gate - security
        run: python -m evolva.cli eval evals/tasks/security.jsonl --yes --baseline evals/baselines/security.json --min-score 1.0 --no-regression
      - name: Eval gate - scorers
        run: python -m evolva.cli eval evals/tasks/scorers.jsonl --yes --baseline evals/baselines/scorers.json --min-score 1.0 --no-regression
      - name: Eval gate - trace artifacts
        run: python -m evolva.cli eval evals/tasks/trace_artifacts.jsonl --yes --baseline evals/baselines/trace_artifacts.json --min-score 1.0 --no-regression
