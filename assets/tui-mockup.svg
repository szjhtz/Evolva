<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Evolva TUI Workbench preview">
  <defs>
    <linearGradient id="page" x1="120" y1="0" x2="1480" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050402"/>
      <stop offset="0.48" stop-color="#0B0803"/>
      <stop offset="1" stop-color="#141007"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11100D"/>
      <stop offset="1" stop-color="#080807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF0B3"/>
      <stop offset="0.45" stop-color="#D9B762"/>
      <stop offset="1" stop-color="#9F7A30"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#000000" flood-opacity="0.72"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9  0 1 0 0 0.7  0 0 1 0 0.25  0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;}
      .sans{font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;}
      .dim{fill:#7E7A70}.muted{fill:#A7A096}.text{fill:#E8E0D0}.gold{fill:#D9B762}.blue{fill:#7AB7FF}.green{fill:#79D18B}.red{fill:#E07A7A}
    </style>
  </defs>

  <rect width="1600" height="980" rx="44" fill="url(#page)"/>
  <circle cx="1310" cy="120" r="260" fill="#D9B762" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="270" cy="820" r="300" fill="#9F7A30" opacity="0.06" filter="url(#softGlow)"/>

  <rect x="90" y="72" width="1420" height="832" rx="30" fill="#080807" stroke="#322511" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="90" y="72" width="1420" height="56" rx="30" fill="#15110A"/>
  <circle cx="126" cy="100" r="7" fill="#7A2D27"/>
  <circle cx="154" cy="100" r="7" fill="#A57B32"/>
  <circle cx="182" cy="100" r="7" fill="#496B39"/>
  <text x="220" y="106" class="mono gold" font-size="18">evolva · local-first self-evolving agent workbench</text>
  <text x="1370" y="106" class="mono dim" font-size="16">TUI-first</text>

  <g transform="translate(132 164)">
    <text x="0" y="0" class="mono gold" font-size="28" font-weight="700">╭───────●</text>
    <text x="0" y="36" class="mono gold" font-size="28" font-weight="700">│  ╭───●</text>
    <text x="0" y="72" class="mono gold" font-size="28" font-weight="700">│  ╰───●</text>
    <text x="0" y="108" class="mono gold" font-size="28" font-weight="700">●──╮</text>
    <text x="0" y="144" class="mono gold" font-size="28" font-weight="700">│  ╰───●</text>
    <text x="0" y="180" class="mono gold" font-size="28" font-weight="700">╰───────●</text>
  </g>
  <text x="410" y="196" class="mono gold" font-size="36" font-weight="800" letter-spacing="8">E V O L A</text>
  <text x="410" y="235" class="mono dim" font-size="18">local_rule-mode · repo=/Users/bytedance/Documents/agent</text>
  <text x="410" y="270" class="mono muted" font-size="18">Trace · Eval · Dream · Loop · MCP · Memory · Guardrails</text>
  <line x1="120" y1="380" x2="1480" y2="380" stroke="#3A2A10" stroke-width="1"/>

  <rect x="120" y="410" width="870" height="360" rx="22" fill="url(#panel)" stroke="#30240F"/>
  <rect x="1020" y="410" width="460" height="360" rx="22" fill="url(#panel)" stroke="#30240F"/>

  <text x="152" y="455" class="mono blue" font-size="18">[18:00:01] You:</text>
  <text x="152" y="488" class="mono text" font-size="20">帮我分析当前仓库，生成可验证的优化计划</text>
  <text x="152" y="552" class="mono gold" font-size="18">[18:00:03] Evolva:</text>
  <text x="152" y="586" class="mono text" font-size="20">我会构建 repo index，读取最近 trace，再把候选改进入 Dream Backlog。</text>
  <text x="152" y="648" class="mono gold" font-size="18">[18:00:08] Evolva:</text>
  <text x="152" y="682" class="mono text" font-size="20">已完成：3 个候选、2 个 verifier、1 条可沉淀 skill proposal。</text>
  <text x="152" y="738" class="mono dim" font-size="18">/model  /mcp  /trace context latest  /loop run dream-loop  /dream backlog</text>

  <text x="1052" y="455" class="sans gold" font-size="22" font-weight="700">Trace / Tool Stream</text>
